apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-regex-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-regex-app
  template:
    metadata:
      labels:
        app: webhook-regex-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
